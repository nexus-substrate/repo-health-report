name: Monthly Trend Snapshot

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month, 06:00 UTC
  workflow_dispatch:
    inputs:
      delay:
        description: 'Delay between batches (ms)'
        default: '3000'
      parallel:
        description: 'Parallel workers (1-3)'
        default: '2'

permissions:
  contents: write

jobs:
  trend-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx tsc

      - name: Generate trend snapshot
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          MONTH=$(date -u +%Y-%m)
          mkdir -p data/trends
          node dist/trend.js \
            --input data/curated-repos.txt \
            --output "data/trends/${MONTH}.json" \
            --delay ${{ inputs.delay || '3000' }} \
            --parallel ${{ inputs.parallel || '2' }}
          echo "MONTH=${MONTH}" >> "$GITHUB_ENV"

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trends/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add ${MONTH} trend snapshot [skip ci]"
            git push
          fi
